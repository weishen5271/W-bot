<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>W-bot Web Chat</title>
  <style>
    :root {
      --bg: #f4f8ff;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --primary: #0369a1;
      --primary-strong: #075985;
      --border: #cbd5e1;
      --bot: #e0f2fe;
      --user: #dcfce7;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 0 0, #e0f2fe 0%, transparent 45%),
        radial-gradient(circle at 100% 100%, #dbeafe 0%, transparent 45%),
        var(--bg);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 85vh;
    }

    .header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(90deg, #e0f2fe, #f0f9ff);
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.2px;
    }

    .session {
      color: var(--muted);
      font-size: 13px;
      max-width: 56%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.16s ease;
    }

    .btn:hover {
      background: var(--primary-strong);
      border-color: var(--primary-strong);
    }

    .messages {
      flex: 1;
      overflow: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeIn 0.18s ease;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user);
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bot);
    }

    .msg.system {
      align-self: center;
      background: #f8fafc;
      color: var(--muted);
      font-size: 13px;
    }

    .assistant-card {
      align-self: flex-start;
      width: min(82%, 720px);
      border: 1px solid rgba(3, 105, 161, 0.18);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(224, 242, 254, 0.72), rgba(255, 255, 255, 0.96));
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      animation: fadeIn 0.18s ease;
    }

    .assistant-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(255, 255, 255, 0.55);
    }

    .assistant-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--primary-strong);
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .assistant-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #38bdf8;
      box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.45);
      animation: pulse 1.4s infinite;
    }

    .assistant-phase {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .assistant-body {
      padding: 12px;
      min-height: 58px;
    }

    .assistant-text {
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .assistant-text.reasoning {
      color: #0f766e;
    }

    .assistant-text.answer {
      color: #0f172a;
      margin-top: 8px;
    }

    .assistant-text.is-streaming::after {
      content: "";
      display: inline-block;
      width: 9px;
      height: 1.15em;
      margin-left: 3px;
      vertical-align: -2px;
      border-radius: 2px;
      background: rgba(3, 105, 161, 0.7);
      animation: blink 0.9s steps(1) infinite;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 14px;
      display: flex;
      gap: 10px;
      background: #f8fafc;
    }

    textarea,
    input[type="password"] {
      flex: 1;
      min-height: 52px;
      max-height: 140px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    input[type="password"] {
      min-height: auto;
      resize: none;
    }

    textarea:focus,
    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(3, 105, 161, 0.12);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.42);
      }
      70% {
        box-shadow: 0 0 0 8px rgba(56, 189, 248, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(56, 189, 248, 0);
      }
    }

    @keyframes blink {
      0%, 45% {
        opacity: 1;
      }
      46%, 100% {
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }
      .app {
        min-height: 92vh;
      }
      .header {
        flex-wrap: wrap;
      }
      .session {
        max-width: 100%;
      }
      .msg {
        max-width: 92%;
      }
      .assistant-card {
        width: 92%;
      }
      .composer {
        flex-direction: column;
      }
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>W-bot Web</h1>
    <div class="session" id="sessionText">session: -</div>
    <button class="btn" id="newSessionBtn" type="button">新会话</button>
  </div>
  <div class="composer" style="padding-top: 0;">
    <input id="tokenInput" type="password" placeholder="可选：Bearer Token（未配置反向代理时使用）" />
  </div>
  <div class="messages" id="messages"></div>
  <div class="composer">
    <textarea id="input" placeholder="输入你的问题，按 Enter 发送，Shift+Enter 换行"></textarea>
    <button class="btn" id="sendBtn" type="button">发送</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const newSessionBtn = document.getElementById("newSessionBtn");
  const sessionText = document.getElementById("sessionText");
  const tokenInputEl = document.getElementById("tokenInput");
  const STORAGE_KEY = "w_bot_web_session_id";
  const TOKEN_STORAGE_KEY = "w_bot_web_bearer_token";
  let sessionId = localStorage.getItem(STORAGE_KEY) || "";
  tokenInputEl.value = localStorage.getItem(TOKEN_STORAGE_KEY) || "";
  let sending = false;

  tokenInputEl.addEventListener("change", () => {
    const token = tokenInputEl.value.trim();
    if (token) {
      localStorage.setItem(TOKEN_STORAGE_KEY, token);
    } else {
      localStorage.removeItem(TOKEN_STORAGE_KEY);
    }
  });

  function buildAuthHeaders(extraHeaders = {}) {
    const headers = {...extraHeaders};
    const token = tokenInputEl.value.trim();
    if (token) {
      headers.Authorization = `Bearer ${token}`;
    }
    return headers;
  }

  function addMessage(role, content, {autoScroll = true} = {}) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = content;
    messagesEl.appendChild(div);
    if (autoScroll) {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    return div;
  }

  function updateSessionView() {
    sessionText.textContent = `session: ${sessionId || "-"}`;
  }

  function normalizeDisplayText(text) {
    const raw = String(text || "").replace(/\r\n/g, "\n");
    const lines = [];
    let buffer = [];
    let cursor = 0;
    let clearOnWrite = false;
    for (const ch of raw) {
      if (ch === "\r") {
        cursor = 0;
        clearOnWrite = true;
        continue;
      }
      if (ch === "\n") {
        lines.push(buffer.join("").replace(/[ \t]+$/g, ""));
        buffer = [];
        cursor = 0;
        clearOnWrite = false;
        continue;
      }
      if (clearOnWrite) {
        buffer = [];
        cursor = 0;
        clearOnWrite = false;
      }
      if (cursor < buffer.length) {
        buffer[cursor] = ch;
      } else {
        buffer.push(ch);
      }
      cursor += 1;
    }
    lines.push(buffer.join("").replace(/[ \t]+$/g, ""));
    return lines.join("\n").replace(/\n{3,}/g, "\n\n");
  }

  function splitThinkContent(text) {
    const normalized = normalizeDisplayText(text);
    const lower = normalized.toLowerCase();
    let result = "";
    let reasoning = "";
    let cursor2 = 0;
    while (true) {
      const start = lower.indexOf("<think>", cursor2);
      if (start < 0) {
        result += normalized.slice(cursor2);
        break;
      }
      result += normalized.slice(cursor2, start);
      const end = lower.indexOf("</think>", start + "<think>".length);
      if (end < 0) {
        reasoning += (reasoning ? "\n\n" : "") + normalized.slice(start + "<think>".length).trim();
        break;
      }
      const thinkBody = normalized.slice(start + "<think>".length, end).trim();
      if (thinkBody) {
        reasoning += (reasoning ? "\n\n" : "") + thinkBody;
      }
      cursor2 = end + "</think>".length;
    }
    return {
      reasoning: reasoning.replace(/<\/?think>/gi, "").replace(/\n{3,}/g, "\n\n").trim(),
      answer: result.replace(/<\/?think>/gi, "").replace(/\n{3,}/g, "\n\n")
    };
  }

  function createAssistantCard() {
    const card = document.createElement("div");
    card.className = "assistant-card";

    const meta = document.createElement("div");
    meta.className = "assistant-meta";

    const badge = document.createElement("div");
    badge.className = "assistant-badge";

    const dot = document.createElement("span");
    dot.className = "assistant-dot";

    const label = document.createElement("span");
    label.textContent = "W-bot";

    const phase = document.createElement("div");
    phase.className = "assistant-phase";
    phase.textContent = "正在理解你的问题...";

    const body = document.createElement("div");
    body.className = "assistant-body";

    const reasoning = document.createElement("div");
    reasoning.className = "assistant-text reasoning is-streaming";

    const text = document.createElement("div");
    text.className = "assistant-text answer is-streaming";

    badge.appendChild(dot);
    badge.appendChild(label);
    meta.appendChild(badge);
    meta.appendChild(phase);
    body.appendChild(reasoning);
    body.appendChild(text);
    card.appendChild(meta);
    card.appendChild(body);
    messagesEl.appendChild(card);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return {card, phase, reasoning, text, dot};
  }

  async function createSessionAndLoadHistory() {
    const res = await fetch("/api/session/new", {method: "POST", headers: buildAuthHeaders()});
    if (!res.ok) throw new Error("新建会话失败");
    const data = await res.json();
    sessionId = data.session_id;
    localStorage.setItem(STORAGE_KEY, sessionId);
    updateSessionView();
    messagesEl.innerHTML = "";
    addMessage("system", "已创建新会话。");
  }

  async function loadHistory() {
    if (!sessionId) {
      await createSessionAndLoadHistory();
      return;
    }
    const res = await fetch(`/api/history?session_id=${encodeURIComponent(sessionId)}`, {
      headers: buildAuthHeaders(),
    });
    if (!res.ok) {
      if (res.status === 401 || res.status === 403) {
        const info = await res.json().catch(() => ({}));
        throw new Error(info.detail || "鉴权失败，请检查 Bearer Token 或反向代理身份头");
      }
      await createSessionAndLoadHistory();
      return;
    }
    const data = await res.json();
    messagesEl.innerHTML = "";
    let count = 0;
    for (const msg of data.messages || []) {
      if (msg.role === "human") {
        addMessage("user", msg.content || "");
        count += 1;
      } else if (msg.role === "thought") {
        addMessage("bot", msg.content || "");
        count += 1;
      }
    }
    if (count === 0) {
      addMessage("system", "欢迎使用 W-bot Web 对话。");
    } else {
      addMessage("system", "已恢复历史会话。");
    }
  }

  async function sendMessage() {
    if (sending) return;
    const text = inputEl.value.trim();
    if (!text) return;
    sending = true;
    sendBtn.disabled = true;
    addMessage("user", text);
    inputEl.value = "";
    const assistantCard = createAssistantCard();
    const botMessageById = new Map();
    let activeBotMsgEl = assistantCard.text;

    let streamRawText = "";
    let streamText = "";
    let streamReasoningText = "";
    let pendingRenderText = "";
    let pendingReasoningText = "";
    let lastRenderAt = performance.now();
    const renderIntervalMs = 50;
    let renderScheduled = false;
    let thinkingTimer = null;
    const thinkingFrames = [
      "Wbot is thinking.",
      "Wbot is thinking..",
      "Wbot is thinking...",
      "Wbot is thinking...."
    ];
    let thinkingIndex = 0;
    let pendingStatusText = "";

    function startThinking() {
      assistantCard.phase.textContent = thinkingFrames[thinkingIndex];
      thinkingTimer = setInterval(() => {
        thinkingIndex = (thinkingIndex + 1) % thinkingFrames.length;
        assistantCard.phase.textContent = thinkingFrames[thinkingIndex];
      }, 280);
    }

    function stopThinking() {
      if (thinkingTimer) {
        clearInterval(thinkingTimer);
        thinkingTimer = null;
      }
    }

    startThinking();

    function shouldStickToBottom() {
      const threshold = 48;
      return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight <= threshold;
    }

    function scrollToBottomIfNeeded(shouldStick) {
      if (shouldStick) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    function flushRender(force = false) {
      renderScheduled = false;
      if (!pendingRenderText && !pendingReasoningText) return;
      const now = performance.now();
      if (!force && !pendingRenderText.includes("\n") && !pendingReasoningText.includes("\n") && now - lastRenderAt < renderIntervalMs) {
        scheduleRender();
        return;
      }
      const stickToBottom = shouldStickToBottom();
      if (pendingReasoningText) {
        streamReasoningText += pendingReasoningText;
        pendingReasoningText = "";
        assistantCard.reasoning.textContent = normalizeDisplayText(streamReasoningText);
      }
      if (pendingRenderText) {
        if (!activeBotMsgEl) {
          activeBotMsgEl = assistantCard.text;
        }
        streamRawText += pendingRenderText;
        pendingRenderText = "";
        const split = splitThinkContent(streamRawText);
        streamReasoningText = split.reasoning;
        streamText = split.answer;
        assistantCard.reasoning.textContent = normalizeDisplayText(streamReasoningText);
        activeBotMsgEl.textContent = normalizeDisplayText(streamText);
      }
      scrollToBottomIfNeeded(stickToBottom);
      lastRenderAt = now;
    }

    function scheduleRender() {
      if (renderScheduled) return;
      renderScheduled = true;
      requestAnimationFrame(() => flushRender(false));
    }

    function enqueueToken(textChunk, kind = "answer") {
      if (!textChunk) return;
      if (kind === "reasoning") {
        pendingReasoningText += textChunk;
        scheduleRender();
        return;
      }
      if (!activeBotMsgEl) {
        activeBotMsgEl = assistantCard.text;
      }
      pendingRenderText += textChunk;
      scheduleRender();
    }

    try {
      const res = await fetch("/api/chat/stream", {
        method: "POST",
        headers: buildAuthHeaders({"Content-Type": "application/json"}),
        body: JSON.stringify({message: text, session_id: sessionId || null}),
      });
      if (!res.ok) {
        const info = await res.json().catch(() => ({}));
        throw new Error(info.detail || "请求失败");
      }

      if (!res.body) {
        throw new Error("浏览器不支持流式响应");
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";
      let finalReply = "";
      let hasToken = false;

      while (true) {
        const {value, done} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});
        buffer = buffer.replace(/\r\n/g, "\n");

        let boundary = buffer.indexOf("\n\n");
        while (boundary !== -1) {
          const block = buffer.slice(0, boundary);
          buffer = buffer.slice(boundary + 2);
          boundary = buffer.indexOf("\n\n");

          if (!block.trim()) continue;
          const lines = block.split("\n");
          let event = "";
          let data = "";
          for (const line of lines) {
            if (line.startsWith("event:")) {
              event = line.slice(6).trim();
            } else if (line.startsWith("data:")) {
              data += line.slice(5).trimStart();
            }
          }

          let parsed = {};
          if (data) {
            parsed = JSON.parse(data);
          }

          if (event === "session" && parsed.session_id) {
            sessionId = parsed.session_id;
            localStorage.setItem(STORAGE_KEY, sessionId);
            updateSessionView();
          } else if (event === "thinking" && parsed.text) {
            if (!hasToken) {
              assistantCard.phase.textContent = parsed.text;
            }
          } else if (event === "token" && (parsed.text || parsed.tokens)) {
            if (!hasToken) {
              hasToken = true;
              stopThinking();
              assistantCard.phase.textContent = pendingStatusText || "正在生成回复...";
            }
            if (parsed.stream_id) {
              botMessageById.set(String(parsed.stream_id), activeBotMsgEl || assistantCard.text);
              activeBotMsgEl = botMessageById.get(String(parsed.stream_id));
            }
            if (Array.isArray(parsed.tokens)) {
              for (const token of parsed.tokens) {
                enqueueToken(String(token.text || ""), String(token.kind || "answer"));
              }
            } else if (parsed.text) {
              enqueueToken(parsed.text, String(parsed.kind || "answer"));
            }
          } else if (event === "stream_meta") {
            if (parsed.stream_id) {
              const msgId = String(parsed.stream_id);
              if (parsed._resuming) {
                if (!botMessageById.has(msgId)) {
                  botMessageById.set(msgId, activeBotMsgEl || assistantCard.text);
                }
                activeBotMsgEl = botMessageById.get(msgId);
              }
            }
            if (parsed._stream_end) {
              flushRender(true);
            }
          } else if (event === "ai_message" && parsed.text) {
            hasToken = true;
            stopThinking();
            assistantCard.phase.textContent = pendingStatusText || "正在生成回复...";
            const msgId = String(parsed.id || "");
            const msgText = String(parsed.text || "");
            if (!msgText) {
              continue;
            }
            flushRender(true);
            if (msgId && botMessageById.has(msgId)) {
              const existing = botMessageById.get(msgId);
              const stickToBottom = shouldStickToBottom();
              const split = splitThinkContent(msgText);
              existing.textContent = normalizeDisplayText(split.answer);
              assistantCard.reasoning.textContent = normalizeDisplayText(split.reasoning);
              streamRawText = msgText;
              streamReasoningText = split.reasoning;
              streamText = split.answer;
              activeBotMsgEl = existing;
              scrollToBottomIfNeeded(stickToBottom);
            } else {
              const nextEl = assistantCard.text;
              const stickToBottom = shouldStickToBottom();
              const split = splitThinkContent(msgText);
              nextEl.textContent = normalizeDisplayText(split.answer);
              assistantCard.reasoning.textContent = normalizeDisplayText(split.reasoning);
              streamRawText = msgText;
              streamReasoningText = split.reasoning;
              streamText = split.answer;
              if (msgId) {
                botMessageById.set(msgId, nextEl);
              }
              activeBotMsgEl = nextEl;
              scrollToBottomIfNeeded(stickToBottom);
            }
          } else if (event === "status" && parsed.text) {
            pendingStatusText = parsed.text;
            assistantCard.phase.textContent = pendingStatusText;
          } else if (event === "done") {
            finalReply = String(parsed.reply || finalReply || "");
            stopThinking();
            flushRender(true);
            if (finalReply) {
              if (!activeBotMsgEl) {
                activeBotMsgEl = assistantCard.text;
              }
              const split = splitThinkContent(finalReply);
              const finalAnswer = normalizeDisplayText(split.answer);
              const finalReasoning = normalizeDisplayText(split.reasoning);
              if (normalizeDisplayText(activeBotMsgEl.textContent || "") !== finalAnswer) {
                streamRawText = parsed.reply || finalReply;
                streamReasoningText = split.reasoning;
                streamText = split.answer;
                assistantCard.reasoning.textContent = finalReasoning;
                activeBotMsgEl.textContent = finalAnswer;
              }
            }
            assistantCard.phase.textContent = "处理完成";
            assistantCard.reasoning.classList.remove("is-streaming");
            assistantCard.text.classList.remove("is-streaming");
            assistantCard.dot.style.animation = "none";
            assistantCard.dot.style.boxShadow = "none";
            assistantCard.dot.style.background = "#22c55e";
          } else if (event === "error") {
            throw new Error(parsed.message || "流式请求失败");
          }
        }
      }

      flushRender(true);

      if ((!activeBotMsgEl || !activeBotMsgEl.textContent) && finalReply) {
        streamRawText = finalReply;
        const split = splitThinkContent(finalReply);
        streamReasoningText = split.reasoning;
        streamText = split.answer;
        assistantCard.reasoning.textContent = normalizeDisplayText(streamReasoningText);
        if (!activeBotMsgEl) {
          activeBotMsgEl = assistantCard.text;
          activeBotMsgEl.textContent = normalizeDisplayText(streamText);
        } else {
          activeBotMsgEl.textContent = normalizeDisplayText(streamText);
        }
      }
    } catch (err) {
      stopThinking();
      assistantCard.card.style.borderColor = "rgba(239, 68, 68, 0.28)";
      assistantCard.phase.textContent = "处理失败";
      assistantCard.text.classList.remove("is-streaming");
      assistantCard.dot.style.animation = "none";
      assistantCard.dot.style.boxShadow = "none";
      assistantCard.dot.style.background = "#ef4444";
      assistantCard.text.textContent = `错误: ${err.message || String(err)}`;
    } finally {
      stopThinking();
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  newSessionBtn.addEventListener("click", createSessionAndLoadHistory);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  updateSessionView();
  loadHistory().catch((err) => addMessage("system", `初始化失败: ${err.message || String(err)}`));
  inputEl.focus();
</script>
